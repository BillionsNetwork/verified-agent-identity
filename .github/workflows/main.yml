
name: Verify Human Identity

on:
  workflow_dispatch:
    inputs:
      agent_name:
        description: 'finder'
        required: true
        default: 'finder'
      agent_description:
        description: 'finder'
        required: true
        default: 'finder AI Agent'
      billions_did:
        description: 'Billions DID'
        required: true
        default: 'did:iden3:billions:main:2VrsXXqcERgYW4SE6zP1TFSGPR4K3cXCBpQ1ikPNuH'

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install ClawHub skill
        run: npx clawhub@latest install verified-agent-identity

      - name: Install script dependencies
        run: |
          cd scripts
          npm install

      - name: Create new Ethereum Identity
        run: node scripts/createNewEthereumIdentity.js

      - name: Link Human to Agent
        run: |
          node scripts/manualLinkHumanToAgent.js \
          --challenge '{"name":"finder","description":"finder AI Agent"}' \
          --human-did "did:iden3:billions:main:2VrsXXqcERgYW4SE6zP1TFSGPR4K3cXCBpQ1ikPNuH"
