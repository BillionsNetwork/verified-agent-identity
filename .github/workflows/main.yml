name: Verify Agent Identity

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          cd scripts
          npm install

      - name: Create Ethereum Identity
        run: node scripts/createNewEthereumIdentity.js

      - name: Generate Challenge
        run: node scripts/generateChallenge.js

      - name: Sign Challenge
        run: node scripts/signChallenge.js

      - name: Verify Signature
        run: node scripts/verifySignature.js
