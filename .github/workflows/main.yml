name: Verify AI Agent Identity

on:
  workflow_dispatch:
    inputs:
      agent_name:
        description: "Nama Agent"
        required: true
        default: "theflow21"
      agent_description:
        description: "Deskripsi Agent"
        required: true
        default: "theflow21 AI Agent"

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # 1. Checkout repository
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3. Debug runner (penting untuk tahu error sebenarnya)
      - name: Debug info
        run: |
          echo "Node version:"
          node -v
          echo "NPM version:"
          npm -v
          echo "Files:"
          ls -R

      # 4. Install ClawHub skill (force non-interactive)
      - name: Step 1 - Install ClawHub skill
        run: |
          npm install -g clawhub
          clawhub install verified-agent-identity --yes || true

      # 5. Install dependencies project
      - name: Install dependencies
        run: |
          if [ -f "package.json" ]; then
            npm install
          fi
          if [ -d "scripts" ] && [ -f "scripts/package.json" ]; then
            cd scripts
            npm install
            cd ..
          fi

      # 6. Create Ethereum Identity
      - name: Step 2 - Create new Ethereum Identity
        run: |
          if [ ! -f "scripts/createNewEthereumIdentity.js" ]; then
            echo "Script tidak ditemukan!"
            exit 1
          fi
          node scripts/createNewEthereumIdentity.js

      # 7. Link Human to Agent (cara paling aman tanpa jq)
      - name: Step 3 - Link Human to Agent
        env:
          AGENT_NAME: ${{ github.event.inputs.agent_name }}
          AGENT_DESCRIPTION: ${{ github.event.inputs.agent_description }}
        run: |
          if [ ! -f "scripts/manualLinkHumanToAgent.js" ]; then
            echo "Script tidak ditemukan!"
            exit 1
          fi

          CHALLENGE="{\"name\":\"$AGENT_NAME\",\"description\":\"$AGENT_DESCRIPTION\"}"
          echo "Challenge JSON:"
          echo $CHALLENGE

          node scripts/manualLinkHumanToAgent.js --challenge "$CHALLENGE"

      # 8. Failure debug
      - name: Print logs if failed
        if: failure()
        run: |
          echo "Workflow gagal. Struktur folder:"
          ls -R
