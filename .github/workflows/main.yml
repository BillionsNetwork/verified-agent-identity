name: rtantan888

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install ClawHub
        run: npm install -g clawhub

      - name: Install Verified Agent Identity
        run: clawhub install verified-agent-identity

      - name: Install dependencies
        run: |
          cd scripts
          npm install

      - name: Create Ethereum Identity
        run: node scripts/createNewEthereumIdentity.js

      - name: Link Human to Agent
        run: |
          node scripts/manualLinkHumanToAgent.js --challenge '{"rtantan888":"rtantan888","description":"rtantan888 AI Agent"}'
