name: Verify Human Identity

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "24"

      - name: Install ClawHub
        run: npm install -g clawhub

      - name: Install Verified Agent Identity
        run: clawhub install verified-agent-identity

      - name: Install dependencies
        run: |
          cd scripts
          npm install

      - name: Create Ethereum Identity
        run: node scripts/createNewEthereumIdentity.js

      - name: Link Human to Agent
        run: |
          node scripts/manualLinkHumanToAgent.js --challenge '{"name"0x15b1ab2573386e1517348090f368864162e1a388,description":"0x15b1ab2573386e1517348090f368864162e1a388 AI Agent"}'
