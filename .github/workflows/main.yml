name: Verify Human Identity

on:
  workflow_dispatch:
    inputs:
      agent_name:
        description: 'Agent name'
        required: true
        default: 'harbbly'
      agent_description:
        description: 'Agent description'
        required: true
        default: 'harbbly AI Agent'

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install ClawHub skill
        run: npx clawhub@latest install verified-agent-identity

      - name: Install dependencies
        run: |
          cd scripts
          npm install

      - name: Create Ethereum Identity
        run: node scripts/create
