name: Verify Human Identity

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install ClawHub
        run: npm install -g clawhub

      - name: Install Verified Agent Identity
        run: clawhub install verified-agent-identity

      - name: Install dependencies
        run: |
          cd naskah
          npm install

      - name: Create Ethereum Identity
        run: node naskah/createNewEthereumIdentity.js

      - name: Link Human to Agent
        run: |
          node naskah/manualLinkHumanToAgent.js --challenge '{"name":"Tahu9898","description":"Tahu9898 AI Agent"}'
